; ─────────────────────────────────────────────────────────────────────────────
; Waveshare ESP32-S3-LCD-1.28 — Audio gauge / configurable display
; Detected hardware on this unit: ESP32-S3, 16 MB quad flash,
;   2 MB embedded QSPI PSRAM. (Waveshare lists this board as "R8 / 8 MB OPI"
;   but this unit reports 2 MB quad — verified via `esptool flash_id`.)
; ─────────────────────────────────────────────────────────────────────────────

[platformio]
default_envs = esp32-s3-lcd-1_28

[env:esp32-s3-lcd-1_28]
platform               = espressif32@^6.9.0
board                  = esp32-s3-devkitc-1
framework              = arduino
monitor_speed          = 115200
upload_speed           = 921600

; ── Flash / PSRAM ───────────────────────────────────────────────────────────
board_upload.flash_size = 16MB
board_build.flash_mode  = qio
board_build.partitions  = default_16MB.csv
board_build.filesystem  = littlefs
board_build.psram_type  = qspi
board_build.arduino.memory_type = qio_qspi

; ── Build flags ─────────────────────────────────────────────────────────────
build_flags =
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_MODE=1
  ; CDC_ON_BOOT=0 → Serial maps to UART0, which is what the onboard/CH343
  ; USB-UART bridge is wired to. Set to 1 only if flashing via native USB-C.
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DCORE_DEBUG_LEVEL=3
  -std=gnu++17
  ; LVGL: tell it to look for our lv_conf.h next to this project (under src/)
  -DLV_CONF_INCLUDE_SIMPLE
  -I src
  ; LovyanGFX: we provide our own panel class, so disable autodetect
  -DLGFX_USE_V1
  ; ArduinoJson: silence deprecation warnings for ESPAsyncWebServer interop
  -DARDUINOJSON_ENABLE_STD_STRING=1

build_unflags =
  -std=gnu++11

; ── Libraries ───────────────────────────────────────────────────────────────
lib_deps =
  lvgl/lvgl@^9.2.2
  lovyan03/LovyanGFX@^1.1.16
  ESP32Async/ESPAsyncWebServer@^3.7.0
  ESP32Async/AsyncTCP@^3.3.2
  bblanchon/ArduinoJson@^7.3.0

; ── OTA flavour — flash over WiFi, no USB cable needed ──────────────────────
;   pio run -e ota -t upload      (firmware)
;   pio run -e ota -t uploadfs    (web UI / LittleFS)
; macOS note: espota's Python resolver can hang on the .local hostname —
; if it fails with "No response from device", pass the IP explicitly:
;   pio run -e ota -t upload --upload-port <device-ip>
[env:ota]
extends         = env:esp32-s3-lcd-1_28
upload_protocol = espota
upload_port     = esp-gauge.local
